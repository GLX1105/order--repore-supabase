<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body {background:#f5f7fa;font-size:14px;line-height:1.4;overflow-x:hidden;position:relative;}

@media screen and (max-width: 768px) {
    .container {flex-direction:column!important;padding:10px!important;gap:10px!important;}
    .risk-report-area {width:100%!important;position:relative!important;top:auto!important;flex:none!important;order:2;margin-top:0!important;}
    .summary-row {display:flex!important;flex-wrap:wrap!important;justify-content:space-between!important;gap:5px!important;}
    .summary-item {width:48%!important;margin-bottom:0!important;font-size:12px!important;padding:6px 8px!important;}

/* 浮动窗口样式 - 可拖动、缩放、最大化、置顶 */
.floating-window {
    position: fixed;
    z-index: 10000;
    background: rgba(30,30,40,0.75);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,0.3);
    transition: box-shadow 0.2s;
    resize: both;
    overflow: hidden;
    min-width: 320px;
    min-height: 400px;
}
.floating-window.maximized {
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    border-radius: 0;
    resize: none;
}
.window-header {
    padding: 10px 12px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    cursor: move;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 18px 18px 0 0;
    user-select: none;
    color: white;
    font-weight: bold;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}
.window-title {
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.window-controls {
    display: flex;
    gap: 8px;
}
.window-controls button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}
.window-controls button:hover {
    background: rgba(255,255,255,0.4);
}
.window-controls .close-btn:hover {
    background: #e74c3c;
}
.window-controls .stay-on-top-btn.active {
    background: #f39c12;
    color: white;
}
.window-content {
    flex: 1;
    overflow: auto;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    padding: 12px;
    border-radius: 0 0 18px 18px;
}
.resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: nw-resize;
    background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.5) 50%);
    border-radius: 0 0 12px 0;
    pointer-events: auto;
    z-index: 10001;
}
/* 隐藏原来的订单卡片，改用浮窗 */
.recognize-wrap .card.recognize-card {
    display: none;
}

<script>
// ================= 浮动窗口管理器 =================
let activeWindows = [];
let topZIndex = 10000;

class DraggableWindow {
    constructor(title, contentHtml, options = {}) {
        this.id = 'win_' + Date.now() + '_' + Math.random();
        this.title = title;
        this.contentHtml = contentHtml;
        this.width = options.width || 700;
        this.height = options.height || 550;
        this.left = options.left || (window.innerWidth/2 - this.width/2);
        this.top = options.top || 80;
        this.stayOnTop = false;
        this.isMaximized = false;
        this.element = null;
        this.create();
    }
    create() {
        const winDiv = document.createElement('div');
        winDiv.className = 'floating-window';
        winDiv.style.width = this.width + 'px';
        winDiv.style.height = this.height + 'px';
        winDiv.style.left = this.left + 'px';
        winDiv.style.top = this.top + 'px';
        winDiv.style.zIndex = topZIndex++;
        winDiv.id = this.id;
        winDiv.innerHTML = `
            <div class="window-header">
                <div class="window-title">📌 ${this.title}</div>
                <div class="window-controls">
                    <button class="stay-on-top-btn" title="窗口置顶">🔝</button>
                    <button class="maximize-btn" title="最大化">🗖</button>
                    <button class="close-btn" title="关闭">✖</button>
                </div>
            </div>
            <div class="window-content"></div>
            <div class="resize-handle"></div>
        `;
        document.body.appendChild(winDiv);
        this.element = winDiv;
        const contentDiv = winDiv.querySelector('.window-content');
        contentDiv.innerHTML = this.contentHtml;
        this.bindEvents();
        this.makeDraggable();
        this.makeResizable();
        this.focus();
    }
    bindEvents() {
        const closeBtn = this.element.querySelector('.close-btn');
        const maxBtn = this.element.querySelector('.maximize-btn');
        const topBtn = this.element.querySelector('.stay-on-top-btn');
        closeBtn.onclick = () => this.destroy();
        maxBtn.onclick = () => this.toggleMaximize();
        topBtn.onclick = () => this.toggleStayOnTop();
        this.element.addEventListener('mousedown', (e) => { if(e.target.closest('.window-header')) this.focus(); });
    }
    focus() { this.element.style.zIndex = topZIndex++; if (this.stayOnTop) this.element.style.zIndex = topZIndex + 1000; }
    toggleStayOnTop() {
        this.stayOnTop = !this.stayOnTop;
        const btn = this.element.querySelector('.stay-on-top-btn');
        if (this.stayOnTop) { btn.classList.add('active'); this.element.style.zIndex = 99999; }
        else { btn.classList.remove('active'); this.element.style.zIndex = topZIndex++; }
    }
    toggleMaximize() {
        if (this.isMaximized) {
            this.element.classList.remove('maximized');
            this.element.style.width = this.width + 'px';
            this.element.style.height = this.height + 'px';
            this.element.style.left = this.left + 'px';
            this.element.style.top = this.top + 'px';
        } else {
            this.left = parseInt(this.element.style.left);
            this.top = parseInt(this.element.style.top);
            this.width = this.element.offsetWidth;
            this.height = this.element.offsetHeight;
            this.element.classList.add('maximized');
            this.element.style.width = '100%';
            this.element.style.height = '100%';
            this.element.style.left = '0';
            this.element.style.top = '0';
        }
        this.isMaximized = !this.isMaximized;
    }
    makeDraggable() {
        const header = this.element.querySelector('.window-header');
        let isDragging = false, startX, startY, startLeft, startTop;
        header.addEventListener('mousedown', (e) => {
            if (this.isMaximized) return;
            if (e.target.closest('.window-controls')) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startLeft = parseInt(this.element.style.left);
            startTop = parseInt(this.element.style.top);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        const onMouseMove = (e) => {
            if (!isDragging) return;
            let dx = e.clientX - startX;
            let dy = e.clientY - startY;
            this.element.style.left = (startLeft + dx) + 'px';
            this.element.style.top = (startTop + dy) + 'px';
        };
        const onMouseUp = () => { isDragging = false; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
    }
    makeResizable() {
        const handle = this.element.querySelector('.resize-handle');
        let isResizing = false, startX, startY, startWidth, startHeight;
        handle.addEventListener('mousedown', (e) => {
            if (this.isMaximized) return;
            e.stopPropagation();
            isResizing = true;
            startX = e.clientX;
            startY = e.clientY;
            startWidth = this.element.offsetWidth;
            startHeight = this.element.offsetHeight;
            document.addEventListener('mousemove', onResize);
            document.addEventListener('mouseup', stopResize);
        });
        const onResize = (e) => {
            if (!isResizing) return;
            let newWidth = startWidth + (e.clientX - startX);
            let newHeight = startHeight + (e.clientY - startY);
            if (newWidth > 320) this.element.style.width = newWidth + 'px';
            if (newHeight > 300) this.element.style.height = newHeight + 'px';
        };
        const stopResize = () => { isResizing = false; document.removeEventListener('mousemove', onResize); document.removeEventListener('mouseup', stopResize); };
    }
    destroy() { if (this.element) this.element.remove(); const idx = activeWindows.findIndex(w => w.id === this.id); if (idx !== -1) activeWindows.splice(idx,1); }
    static open(title, contentHtml, options) { const win = new DraggableWindow(title, contentHtml, options); activeWindows.push(win); return win; }
}
function openFloatingDialog(title, contentHtml, width=550, height=500) {
    return DraggableWindow.open(title, contentHtml, { width, height, left: (window.innerWidth/2 - width/2), top: 100 });
}
// 获取订单卡片原始HTML（隐藏的原卡片）
function getOrderCardHTML() {
    const originalCard = document.querySelector('.recognize-wrap .card.recognize-card');
    if (originalCard) return originalCard.cloneNode(true).innerHTML;
    return `<div class="card recognize-card" style="width:100%"><div class="card-title">订单输入
          <select id="orderUserSelect" style="padding:4px 8px;"></select>
          <input type="date" id="orderDate">
          <span id="orderTotalAmountBox" style="display:none;">合计：<span id="orderTotalAmount">0</span></span>
          <button class="btn btn-prefix" onclick="showPrefixManager()">前缀</button>
          <button class="btn btn-suffix" onclick="showSuffixManager()">后缀</button>
          <button class="btn btn-amount-prefix" onclick="showAmountSuffixManager()">金额后缀</button>
        </div>
        <div class="order-input-container"><div class="input-column"><div class="box-label">订单输入框</div><textarea class="source-order-input" placeholder="" oninput="convertOrderText()"></textarea></div><div class="result-column"><div class="box-label">识别结果</div><textarea class="result-content" id="orderResult" readonly></textarea></div></div>
        <div style="display:flex;gap:8px;margin-top:10px;"><button class="btn btn-paste" onclick="pasteOrder()">粘贴订单</button><button class="btn btn-save-order" onclick="saveOrder()">保存下单</button><button class="btn btn-report" onclick="saveReportOrder()">上报</button><button class="btn btn-clear" onclick="clearAllInput()">清空</button><button class="btn btn-replace-sep" onclick="replaceSeparators()">换分隔</button><button class="btn btn-remove-sep" onclick="removeSeparators()">去分隔</button><button class="btn btn-cancel" onclick="semanticReplace()">语义转换</button></div>
    </div>`;
}
let orderWindow = null;
function showOrderFloatingWindow() {
    if (orderWindow && document.getElementById(orderWindow.id)) { orderWindow.focus(); return; }
    const content = getOrderCardHTML();
    orderWindow = DraggableWindow.open("📝 订单输入", content, { width: 780, height: 580 });
    setTimeout(() => {
        if (orderWindow && orderWindow.element) {
            const textarea = orderWindow.element.querySelector('.source-order-input');
            if (textarea) textarea.oninput = convertOrderText;
            const dateInput = orderWindow.element.querySelector('#orderDate');
            if(dateInput && !dateInput.value) dateInput.value = getTodayCST();
            updateSelectsInWindow(orderWindow.element);
        }
    }, 30);
}
function updateSelectsInWindow(winEl) {
    const userSel = winEl.querySelector('#orderUserSelect');
    if(userSel){
        const users = getUsers();
        userSel.innerHTML = '';
        users.forEach(u => { let opt = document.createElement('option'); opt.value = u; opt.textContent = u; userSel.appendChild(opt); });
    }
}
// 重写原有弹窗函数为浮动窗口
const originalShowDatabase = window.showDatabase;
window.showDatabase = async function() {
    const pwd = await prompt("请输入数据库密码：","");
    if (pwd !== "891105") { alert("密码错误"); return; }
    const configHtml = document.querySelector('#databaseModal .database-modal-body').cloneNode(true).innerHTML;
    openFloatingDialog("📊 数据库配置", `<div class="data-config-card">${configHtml}</div>`, 850, 650);
};
window.showOrderRecord = async function(filter='all'){
    const records = await getOrderRecords();
    const users = getUsers();
    let html = `<div><select id="recordUserFilter" onchange="applyPrizeFilterDynamic()"><option value="all">全部用户</option>${users.map(u=>`<option value="${u}">${u}</option>`).join('')}</select>
    <input type="date" id="recordDateFilter" value="${getTodayCST()}" onchange="applyPrizeFilterDynamic()">
    <input type="text" id="prizeNumberInput" placeholder="对奖号" maxlength="2" oninput="applyPrizeFilterDynamic()">
    <button onclick="checkAllDynamic()">全选</button><button onclick="uncheckAllDynamic()">取消全选</button><button onclick="deleteCheckedDynamic()">批量删除</button>
    <div id="orderListContainerDynamic"></div></div>`;
    const win = openFloatingDialog("📋 下单记录", html, 700, 500);
    setTimeout(() => { applyPrizeFilterDynamic(win); }, 50);
    window.currentOrderWin = win;
};
window.showReportOrderRecord = async function(filter='all'){
    const records = await getReportOrderRecords();
    const users = getUsers();
    let html = `<div><select id="reportRecordUserFilter" onchange="showReportOrderRecord(this.value)">${users.map(u=>`<option value="${u}">${u}</option>`).join('')}</select>
    <button onclick="checkAllReportDynamic()">全选</button><button onclick="uncheckAllReportDynamic()">取消全选</button><button onclick="deleteCheckedReportDynamic()">批量删除</button>
    <div id="reportListContainerDynamic"></div></div>`;
    const win = openFloatingDialog("📤 上报数据", html, 700, 500);

    request.onerror = () => { resolve(false); };
    request.onsuccess = (event) => { db = event.target.result; resolve(true); };

function tokenizeAndJoin(content) {
  const SEPARATORS = /[\s,，.。、+\-*＊\/\\|]+/;
  const configData = getAllConfigData();
  const validCategories = getAllValidCategories(configData);
  const rawTokens = content.split(SEPARATORS).filter(t => t.trim()).map(t => t.trim());
  const tokens = [];
  rawTokens.forEach(t => {
    const tailMatch = t.match(/^(\d{2,})尾$/);
    const headMatch = t.match(/^(\d{2,})头$/);
    if (tailMatch) { const digits = tailMatch[1].split('').map(d => d + '尾'); tokens.push(...digits); }
    else if (headMatch) { const digits = headMatch[1].split('').map(d => d + '头'); tokens.push(...digits); }
    else if (/^\d{1,2}$/.test(t)) { const num = parseInt(t); if (num >= 1 && num <= 49) tokens.push(t.length === 1 ? '0' + t : t); }
    else if (validCategories.has(t)) { tokens.push(t); }
    else if (/^[\u4e00-\u9fa5]+$/.test(t)) { const chars = t.match(/[\u4e00-\u9fa5]/g) || []; if (chars.every(c => validCategories.has(c))) { tokens.push(...chars); } }
  });
  return tokens.join('-');
}

  const allPrefixes = [...IGNORE_PREFIXES, ...customPrefixes];
  const customSuffixes = getCustomSuffixes();
  const baseSuffixes = '元块咪斤#،。\\s';
  const customAmountSuffixes = getCustomAmountSuffixes();
  const allAmountChars = [...new Set([...baseSuffixes.split(''), ...customAmountSuffixes])].join('');
  const AMOUNT_SUFFIX = `[${allAmountChars}]*`;
  function cnToNum(s) {
    const map = { '零':0, '一':1, '二':2, '三':3, '四':4, '五':5, '六':6, '七':7, '八':8, '九':9, '十':10, '百':100, '千':1000 };
    let sum = 0, tmp = 0;
    for (let ch of s) { const val = map[ch]; if (val === 10 || val === 100 || val === 1000) { if (tmp === 0) tmp = 1; tmp *= val; sum += tmp; tmp = 0; } else if (val !== undefined) { if (tmp > 0) { sum += tmp; tmp = 0; } tmp = val; } }
    sum += tmp; return sum;
  }
  lines.forEach(line => {
    line = line.trim();
    if (!line) return;
    let cleanedLine = line;
    for (const prefix of allPrefixes) { if (cleanedLine.startsWith(prefix)) { cleanedLine = cleanedLine.substring(prefix.length).trim(); } }
    for (const suffix of customSuffixes) { if (cleanedLine.endsWith(suffix)) { cleanedLine = cleanedLine.slice(0, -suffix.length).trim(); } }
    cleanedLine = cleanedLine.replace(/([一二三四五六七八九十百千]+)/g, (match) => cnToNum(match));
    const orderPattern = new RegExp(`(${AMOUNT_PREFIX}\\d+${AMOUNT_SUFFIX})`, 'g');
    const orderMatches = cleanedLine.match(orderPattern);
    if (orderMatches && orderMatches.length > 0) {
      let remainingLine = cleanedLine;
      orderMatches.forEach(orderMatch => {
        const orderIndex = remainingLine.indexOf(orderMatch);
        if (orderIndex !== -1) {
          const content = remainingLine.substring(0, orderIndex).trim();
          const amountMatch = orderMatch.match(/(\d+)/);
          if (amountMatch) {
            const amount = amountMatch[1];
            if (content) { const joined = tokenizeAndJoin(content); if (joined) resultLines.push(`${joined} 各数 ${amount}`); }
            remainingLine = remainingLine.substring(orderIndex + orderMatch.length);
          }
        }
      });
      if (remainingLine.trim()) { const joined = tokenizeAndJoin(remainingLine.trim()); if (joined) resultLines.push(`${joined} 各数 0`); }
    } else {
      const pattern = new RegExp(`^(.+?)${AMOUNT_PREFIX}(\\d+)$`);
      const match = cleanedLine.match(pattern);
      if (match) { const joined = tokenizeAndJoin(match[1].trim()); if (joined) resultLines.push(`${joined} 各数 ${match[2]}`); }
      else {
        const singlePattern = new RegExp(`(\\d+)(?:号|${AMOUNT_PREFIX})(\\d+)$`);
        const singleMatch = cleanedLine.match(singlePattern);
        if (singleMatch) { let number = singleMatch[1].trim(); if (parseInt(number) >= 1 && parseInt(number) <= 49) { number = number.length===1?`0${number}`:number; resultLines.push(`${number} 各数 ${singleMatch[2]}`); } }
        else { const joined = tokenizeAndJoin(cleanedLine); if (joined) resultLines.push(`${joined} 各数 0`); }
      }
    }
  });
  document.getElementById('orderResult').value = resultLines.join('\n');
  updateOrderTotalDisplay();
}

function countItemsInLine(line, configData, categoryKeys) {
  const pattern = /([\u4e00-\u9fa5\d\-]+)\s+各数\s+(\d+)/;
  const match = line.match(pattern);
  if (!match) return { numbers:[], zodiacs:[], amount:0 };
  let content = match[1]; const amount = parseInt(match[2])||0;
  const items = content.split('-').map(i=>i.trim()).filter(i=>i);
  const numbers = [], zodiacs = [];
  items.forEach(item => {
    if (/^\d+$/.test(item)) { numbers.push(item.padStart(2,'0')); }
    else if (configData.shengxiaoAttr[item]) { const zodiacList = configData.shengxiaoAttr[item] || []; zodiacList.forEach(z=>zodiacs.push(z)); }
    else if (configData.zodiac[item]) { zodiacs.push(item); }
    else if (configData.toushuDanshuang && configData.toushuDanshuang[item]) { (configData.toushuDanshuang[item] || []).forEach(n => numbers.push(n.padStart(2,'0'))); }
    else { const numList = configData.wuxing[item] || configData.bose[item] || configData.banbo[item] || configData.danshuang[item] || configData.weishu[item] || configData.daxiaodanshuang[item] || configData.daxiao[item] || configData.heshu[item] || configData.toushu[item] || configData.menshu[item] || configData.duanwei[item] || configData.hedahexiao[item] || configData.weidaweixiao[item] || configData.hewei[item] || configData.heshudanshuang[item] || configData.toushuDanshuang[item]; if (numList) numList.forEach(n => numbers.push(n.padStart(2,'0'))); }
  });
  return { numbers, zodiacs, amount };
}

function processCurrentOrder(input, user, isNormal, date = null) { 
  const configData = getAllConfigData(); 
  const categoryKeys = getAllValidCategories(configData); 
  const lines = input.split('\n').filter(l=>l.trim()); 
  if (!userBetData[user]) userBetData[user] = {}; 
  const currentStartZodiac = localStorage.getItem('selectedStartZodiac') || '马'; 
  lines.forEach(line => { 
    const { numbers, zodiacs, amount } = countItemsInLine(line, configData, categoryKeys); 
    const numMin = parseInt(document.getElementById('numAmountMin').value)||1, numMax = parseInt(document.getElementById('numAmountMax').value)||50000; 
    const zodMin = parseInt(document.getElementById('zodiacAmountMin').value)||1, zodMax = parseInt(document.getElementById('zodiacAmountMax').value)||50000; 
    if (isNormal) { 
      if (zodiacs.length > 0) { 
        zodiacs.forEach(z => { 
          const weight = z === currentStartZodiac ? 5 : 4; 
          zodiacWeightedTotal += amount * weight; 
        }); 
      } else if (numbers.length > 0) { 
        numberOrderTotal += numbers.length * amount; 
      } 
    }
    numbers.forEach(num => { 
      if (isNormal) { 
        userBetData[user][num] = (userBetData[user][num]||0)+amount; 
        tableBetData[num] = (tableBetData[num]||0) + amount; 
        reportBetData[num] = (reportBetData[num]||0) + amount; 
        numberCount[num] = (numberCount[num]||0)+1; 
        if (amount>=numMin && amount<=numMax) numberAmountCount[num] = (numberAmountCount[num]||0)+1; 
      } else { 
        userBetData[user][num] = (userBetData[user][num]||0) - amount; 
        reportBetData[num] = (reportBetData[num]||0) - amount; 
        reportAmountData[num] = (reportAmountData[num]||0) + amount; 
      } 
    }); 
    zodiacs.forEach(z => { 
      if (isNormal) { 
        zodiacCount[z] = (zodiacCount[z]||0)+1; 
        if (amount>=zodMin && amount<=zodMax) zodiacAmountCount[z] = (zodiacAmountCount[z]||0)+1; 
        (configData.zodiac[z]||[]).forEach(n => { 
          const num = n.padStart(2,'0'); 
          userBetData[user][num] = (userBetData[user][num]||0)+amount; 
          tableBetData[num] = (tableBetData[num]||0) + amount; 
          reportBetData[num] = (reportBetData[num]||0) + amount; 
        }); 
      } else { 
        (configData.zodiac[z]||[]).forEach(n => { 
          const num = n.padStart(2,'0'); 
          userBetData[user][num] = (userBetData[user][num]||0) - amount; 
          reportBetData[num] = (reportBetData[num]||0) - amount; 
          reportAmountData[num] = (reportAmountData[num]||0) + amount; 
        }); 
      } 
    }); 
  }); 
  generateRiskTable(); 
  generateReportTable(); 
  renderFrequencyCards(); 
  renderAmountFrequencyCards(); 
  renderReportAmountTable(); 
  updateReportAmountTotal(); 
  updateAmountDisplays(); 
}

function generateRiskTable() {
  const switcher = document.getElementById('riskReportSwitcher').value;
  let data;
  if (switcher === 'total') data = tableBetData;
  else if (switcher === 'user') { const user = document.getElementById('viewUserSelect').value; data = userBetData[user] || {}; }
  else data = reportBetData;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  let total = 0;
  const multiple = parseFloat(document.getElementById('multipleVal').value)||1;
  const rebateRate = parseFloat(document.getElementById('rebateRate').value)||0;
  let list = [];
  for(let num in data) { const bet = data[num]; total += bet; list.push({num, bet}); }
  for(let i=1;i<=49;i++) { const num = i.toString().padStart(2,'0'); if(!data[num]) list.push({num,bet:0}); }
  list.sort((a,b)=>b.bet-a.bet);
  const rebate = (total * rebateRate / 100).toFixed(2);
  list.forEach((item, index) => {
    const {num, bet} = item;
    const risk = Math.round(total - bet*multiple - parseFloat(rebate));
    let colorClass = redNumbers.includes(num) ? 'red-text' : (blueNumbers.includes(num) ? 'blue-text' : 'green-text');
    const tr = document.createElement('tr');
    tr.className = colorClass;

  });

  document.getElementById('totalRebate').textContent = rebate;
}

function generateReportTable() {
  const capInput = document.getElementById('reportCapInput');
  let capValue = parseFloat(capInput.value);
  if (isNaN(capValue) || capValue <= 0) capInput.value = '';
  const data = reportBetData;
  const tbody = document.getElementById('reportTableBody');
  tbody.innerHTML = '';
  const multiple = parseFloat(document.getElementById('reportMultipleVal').value)||1;
  const rebateRate = parseFloat(document.getElementById('reportRebateRate').value)||0;
  let total = 0;
  let list = [];
  for(let num in data) { let bet = data[num]; if (!isNaN(capValue) && capValue > 0 && bet > capValue) bet = capValue; total += bet; list.push({num, bet}); }
  for(let i=1;i<=49;i++) { const num = i.toString().padStart(2,'0'); if(!data[num]) list.push({num,bet:0}); }
  list.sort((a,b)=>b.bet-a.bet);
  const rebate = (total * rebateRate / 100).toFixed(2);
  list.forEach((item, index) => {
    const {num, bet} = item;
    const risk = Math.round(total - bet*multiple - parseFloat(rebate));
    let colorClass = redNumbers.includes(num) ? 'red-text' : (blueNumbers.includes(num) ? 'blue-text' : 'green-text');
    const tr = document.createElement('tr');
    tr.className = colorClass;
    tr.innerHTML = `<td>${num}${currentZodiacMap[num]||''}</td><td>${bet}</td><td>${risk}</td><td>${num}</td><td>${index+1}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('reportTotalBet').textContent = total;
  document.getElementById('reportTotalRebate').textContent = rebate;
  const infoDiv = document.getElementById('reportCapInfo');
  if (!isNaN(capValue) && capValue > 0) {
    const exceedList = [];
    for(let num in data) { if (data[num] > capValue) exceedList.push({num, exceed: data[num] - capValue}); }
    if (exceedList.length > 0) {
      exceedList.sort((a,b) => a.exceed - b.exceed);
      let text = ''; let totalExceed = 0;
      exceedList.forEach(item => { text += `${item.num}各${item.exceed}米<br>`; totalExceed += item.exceed; });
      text += `合计${totalExceed}`;
      infoDiv.innerHTML = text;
    } else { infoDiv.textContent = '无超出的号码'; }
  } else { infoDiv.textContent = ''; }
  if (Object.keys(data).length > 0) { const maxBet = Math.max(...Object.values(data)); capInput.placeholder = `当前最大: ${maxBet}`; }
}

async function screenshotTable(tableId) {

  try {
    const canvas = await html2canvas(targetTable, { backgroundColor: '#ffffff', scale: 2, logging: false });
    canvas.toBlob(async (blob) => {
      if (!blob) { showToast('生成图片失败'); return; }
      try { const item = new ClipboardItem({ 'image/png': blob }); await navigator.clipboard.write([item]); showToast('截图已复制到剪贴板'); }
      catch (err) { showToast('复制失败，请检查浏览器权限'); }
    }, 'image/png');

}

function formatTimestampToCST(isoString) { const date = new Date(isoString); return new Intl.DateTimeFormat('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone:'Asia/Shanghai' }).format(date); }

function getUserColor(username) {
  let hash = 0;
  for (let i = 0; i < username.length; i++) { hash = username.charCodeAt(i) + ((hash << 5) - hash); }
  const hue = (hash % 360 + 360) % 360;
  return `hsl(${hue}, 70%, 45%)`;
}

function getNumberListForCategory(catName, configData) {
  const nums = [];
  if (configData.shengxiaoAttr[catName]) { const zodiacs = configData.shengxiaoAttr[catName]; zodiacs.forEach(z => { if (configData.zodiac[z]) nums.push(...configData.zodiac[z].map(n => n.toString().padStart(2, '0'))); }); }
  const direct = configData.wuxing[catName] || configData.bose[catName] || configData.banbo[catName] || configData.danshuang[catName] || configData.weishu[catName] || configData.daxiaodanshuang[catName] || configData.daxiao[catName] || configData.heshu[catName] || configData.toushu[catName] || configData.menshu[catName] || configData.duanwei[catName] || configData.hedahexiao[catName] || configData.weidaweixiao[catName] || configData.hewei[catName] || configData.heshudanshuang[catName] || configData.toushuDanshuang[catName];
  if (direct) nums.push(...direct.map(n => n.toString().padStart(2, '0')));
  if (configData.zodiac[catName]) nums.push(...configData.zodiac[catName].map(n => n.toString().padStart(2, '0')));
  return [...new Set(nums)];
}

function isTokenMatching(token, targetNum, configData) {
  const target = targetNum.padStart(2, '0');
  if (/^\d{1,2}$/.test(token)) return token.padStart(2, '0') === target;
  const validCategories = getAllValidCategories(configData);
  if (validCategories.has(token)) { const nums = getNumberListForCategory(token, configData); return nums.includes(target); }
  return false;
}

function highlightContent(content, targetNum, configData) {
  if (!targetNum) return content;
  const target = targetNum.padStart(2, '0');
  const parts = []; let temp = '';
  for (const ch of content) { if (ch === '-' || ch === ' ') { if (temp) parts.push(temp); parts.push(ch); temp = ''; } else { temp += ch; } }
  if (temp) parts.push(temp);
  const result = parts.map(part => { if (part === '-' || part === ' ') return part; if (isTokenMatching(part, targetNum, configData)) return `<span class="highlight-number">${part}</span>`; return part; }).join('');
  return result;
}

function orderContainsTarget(content, targetNum, configData) {
  if (!targetNum) return true;
  const target = targetNum.padStart(2, '0');
  const lines = content.split('\n');
  for (const line of lines) {
    const match = line.match(/^(.+?)\s+各数\s+(\d+)$/);
    if (!match) continue;
    const cont = match[1]; const parts = []; let temp = '';
    for (const ch of cont) { if (ch === '-' || ch === ' ') { if (temp) parts.push(temp); temp = ''; } else { temp += ch; } }
    if (temp) parts.push(temp);
    for (const part of parts) { if (part !== '-' && part !== ' ' && isTokenMatching(part, targetNum, configData)) return true; }
  }
  return false;
}

async function applyPrizeFilter() {
  const dateInput = document.getElementById('recordDateFilter'); const prizeInput = document.getElementById('prizeNumberInput'); const userFilter = document.getElementById('recordUserFilter');
  if (!dateInput || !prizeInput || !userFilter) return;
  const selectedDate = dateInput.value; const prizeNum = prizeInput.value.trim(); const userVal = userFilter.value;
  const records = await getOrderRecords();
  let filtered = userVal === 'all' ? records : records.filter(r => r.user === userVal);
  if (selectedDate) filtered = filtered.filter(r => r.date === selectedDate);
  const configData = getAllConfigData();
  let finalList = [];
  if (prizeNum) { for (const item of filtered) { if (orderContainsTarget(item.content, prizeNum, configData)) finalList.push(item); } }
  else { finalList = filtered; }
  const container = document.getElementById('orderListContainer');
  if (!container) return;
  if (finalList.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">暂无匹配订单</div>'; return; }
  container.innerHTML = finalList.map(item => {
    const timeStr = formatTimestampToCST(item.timestamp); const userDisplay = item.user || '未知'; const color = getUserColor(userDisplay); const totalAmt = item.totalAmount || 0;
    const lines = item.content.split('\n');
    const highlightedLines = lines.map(line => { const m = line.match(/^(.+?)\s+各数\s+(\d+)$/); if (!m) return line; const cont = m[1], amt = m[2]; const hlContent = highlightContent(cont, prizeNum, configData); return `${hlContent} 各数 ${amt}`; }).join('<br>');
    return `<div class="order-item"><input type="checkbox" class="order-check" data-id="${item.id}"><div class="order-content">${highlightedLines}</div><div class="order-info"><span class="order-total" style="color:#000;">合计：${totalAmt}</span><span class="order-meta"><span style="color:${color};">用户：${userDisplay}</span> &nbsp; ${timeStr}</span></div><button class="order-del" onclick="deleteOrderRecord(${item.id})">删除</button></div>`;
  }).join('');
}

async function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json'; input.style.display = 'none';
  document.body.appendChild(input);
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) { document.body.removeChild(input); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.orders || !data.reports) { showToast('无效的数据格式'); document.body.removeChild(input); return; }
        const existingOrders = await getOrderRecords(); const existingReports = await getReportOrderRecords();
        let skipOrders = 0, newOrders = 0;
        for (const rec of data.orders) { const exist = existingOrders.find(o => o.timestamp === rec.timestamp && o.content === rec.content && o.user === rec.user); if (exist) skipOrders++; else newOrders++; }
        let skipReports = 0, newReports = 0;
        for (const rec of data.reports) { const exist = existingReports.find(o => o.timestamp === rec.timestamp && o.content === rec.content && o.user === rec.user); if (exist) skipReports++; else newReports++; }
        const totalNew = newOrders + newReports;
        if (totalNew === 0) { showToast(`没有新记录可导入。\n当前数据库已有下单记录 ${existingOrders.length} 条，上报记录 ${existingReports.length} 条。`); document.body.removeChild(input); return; }
        const message = `当前数据库已有：\n下单记录 ${existingOrders.length} 条\n上报记录 ${existingReports.length} 条\n\n导入文件包含：\n下单记录 ${data.orders.length} 条（重复 ${skipOrders} 条，新增 ${newOrders} 条）\n上报记录 ${data.reports.length} 条（重复 ${skipReports} 条，新增 ${newReports} 条）\n\n是否导入新增的 ${totalNew} 条记录？`;
        const confirmed = await confirm(message);
        if (!confirmed) { document.body.removeChild(input); return; }
        for (const rec of data.orders) { const exist = existingOrders.find(o => o.timestamp === rec.timestamp && o.content === rec.content && o.user === rec.user); if (!exist) await saveOrderRecordToIDB(rec.content, rec.user, rec.date, rec.totalAmount || 0); }
        for (const rec of data.reports) { const exist = existingReports.find(o => o.timestamp === rec.timestamp && o.content === rec.content && o.user === rec.user); if (!exist) await saveReportOrderRecordToIDB(rec.content, rec.user, rec.date, rec.totalAmount || 0); }
        if (data.config) localStorage.setItem('customDataConfigObj', data.config);
        if (data.presets) localStorage.setItem('replacePresets', data.presets);
        if (data.aliases) localStorage.setItem('categoryAliases', data.aliases);
        if (data.prefixes) localStorage.setItem('customPrefixes', data.prefixes);
        if (data.suffixes) localStorage.setItem('customSuffixes', data.suffixes);
        if (data.amountSuffixes) localStorage.setItem('customAmountSuffixes', data.amountSuffixes);
        initDataConfig(); await updateTableFromRecords(); calculateStorageUsage();
        showToast(`成功导入 ${totalNew} 条新记录。`);
        document.body.removeChild(input);
      } catch (err) { showToast('导入失败，请检查文件格式'); document.body.removeChild(input); }
    };
    reader.onerror = async () => { showToast('文件读取失败'); document.body.removeChild(input); };
    reader.readAsText(file);
  };
  input.addEventListener('cancel', () => { document.body.removeChild(input); });
  input.click();
}

function generateSelfVerifyingCard(expireDays) {
  const now = Date.now();
  const expireMs = expireDays * 86400000;
  const raw = `${now}-${expireMs}-${CARD_SECRET}`;
  let hash = 0;
  for (let i = 0; i < raw.length; i++) { hash = ((hash << 5) - hash) + raw.charCodeAt(i); hash |= 0; }
  hash = Math.abs(hash).toString(16).toUpperCase().padStart(4, '0');
  const payload = now.toString(36).toUpperCase() + '-' + expireMs.toString(36).toUpperCase();
  return `${payload}-${hash}`;
}
function verifySelfVerifyingCard(code) {
  const parts = code.split('-');
  if (parts.length !== 3) return { valid: false, reason: '卡密格式错误' };
  const payload = parts[0] + '-' + parts[1];
  const providedHash = parts[2];
  const now = Date.now();
  let createTime, expireMs;
  try { createTime = parseInt(parts[0], 36); expireMs = parseInt(parts[1], 36); } catch(e) { return { valid: false, reason: '卡密无效' }; }
  if (isNaN(createTime) || isNaN(expireMs)) return { valid: false, reason: '卡密无效' };
  const expireTime = createTime + expireMs;
  if (now > expireTime) return { valid: false, reason: '卡密已过期' };
  const raw = `${createTime}-${expireMs}-${CARD_SECRET}`;
  let hash = 0;
  for (let i = 0; i < raw.length; i++) { hash = ((hash << 5) - hash) + raw.charCodeAt(i); hash |= 0; }
  const computedHash = Math.abs(hash).toString(16).toUpperCase().padStart(4, '0');
  if (computedHash !== providedHash) return { valid: false, reason: '卡密验证失败' };
  const keys = getCardKeys();
  const found = keys.find(k => k.code === code);
  if (found && found.status === 'disabled') return { valid: false, reason: '卡密已被禁用' };
  if (!found) { keys.push({ code, status: 'active', createTime: new Date(createTime).toISOString(), expireDays: Math.ceil(expireMs / 86400000) }); saveCardKeys(keys); }
  return { valid: true, card: { code, status: 'active' } };
}
function checkCardAccess(code) { return verifySelfVerifyingCard(code); }

  return false;
}

function showCardManager() { if (!isAdmin()) { showToast('需要管理员权限'); return; } const keys = getCardKeys(); let html = `<div class="modal-overlay" id="cardManagerModal"><div class="modal-box" style="max-width:600px;"><div class="modal-header"><h3>🔑 卡密管理</h3><button onclick="document.getElementById('cardManagerModal').remove()" style="background:none;border:none;color:#fff;font-size:18px;">×</button></div><div class="modal-body"><div style="margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;"><input type="number" id="expireDaysInput" placeholder="有效天数" value="30" min="1" style="padding:5px;border-radius:4px;border:1px solid #ccc;width:80px;"><span>天</span><button onclick="generateCardKey()" style="padding:6px 15px;background:#28a745;color:#fff;border:none;border-radius:4px;">生成卡密</button></div><div id="cardListContainer">`; if (keys.length === 0) { html += `<div style="text-align:center;color:#666;padding:20px;">暂无卡密</div>`; } else { keys.forEach((card, idx) => { html += `<div style="border:1px solid #eee;border-radius:6px;padding:8px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;"><span style="font-weight:bold;font-size:16px;">${card.code}</span><span style="color:${card.status==='active'?'green':'red'};">[${card.status==='active'?'启用':'禁用'}]</span><span style="font-size:11px;color:#666;">创建:${card.createTime} 有效${card.expireDays}天</span><div style="margin-left:auto;display:flex;gap:5px;">${card.status==='active'?`<button onclick="disableCard(${idx})" style="background:#f39c12;color:#fff;">禁用</button>`:''}${card.status==='disabled'?`<button onclick="enableCard(${idx})" style="background:#2ecc71;color:#fff;">启用</button>`:''}<button onclick="deleteCard(${idx})" style="background:#e74c3c;color:#fff;">删除</button></div></div>`; }); } html += `</div></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); }
async function generateCardKey() { const expireDays = parseInt(document.getElementById('expireDaysInput').value) || 30; if (expireDays < 1) { showToast('有效期至少1天'); return; } const code = generateSelfVerifyingCard(expireDays); const keys = getCardKeys(); if (keys.find(k => k.code === code)) { showToast('卡密生成冲突，请重试'); return; } keys.push({ code, status: 'active', createTime: new Date().toISOString(), expireDays }); saveCardKeys(keys); document.getElementById('cardManagerModal').remove(); showCardManager(); showToast(`卡密 ${code} 已生成，有效期${expireDays}天`); }
