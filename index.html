<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单报表系统（云同步完整版）</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        body{background:linear-gradient(135deg,#1a2a6c,#2c3e50);color:#333;min-height:100vh;padding:15px}
        .login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;justify-content:center;align-items:center;z-index:10000}
        .login-box{background:#fff;padding:30px;border-radius:10px;box-shadow:0 5px 25px rgba(0,0,0,0.5);text-align:center;width:350px}
        .login-box h2{color:#2c3e50;margin-bottom:20px}
        .login-input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px;font-size:1rem}
        .login-btn{background:linear-gradient(to right,#3498db,#2980b9);color:#fff;border:none;padding:12px 20px;border-radius:5px;cursor:pointer;font-size:1rem;font-weight:600;width:100%;margin-top:15px}
        .login-error{color:#e74c3c;margin-top:10px;display:none}
        .container{max-width:1700px;width:100%;margin:0 auto;display:flex;gap:20px}
        .main-content{flex:1;min-width:0}
        .user-sidebar{width:530px;background:rgba(255,255,255,0.1);border-radius:10px;padding:15px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2)}
        .big-user-card{background:#fff;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.15);overflow:hidden;margin-bottom:20px;width:100%}
        .big-card-header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 15px;font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:8px}
        .big-card-content{padding:15px}
        .search-filter-section{background:#fff;border-radius:8px;padding:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .search-box{display:flex;margin-bottom:10px;gap:8px}
        .search-input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:0.85rem}
        .search-btn{background:#3498db;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:0.85rem}
        .filter-group{display:flex;gap:8px;flex-wrap:wrap}
        .filter-item{display:flex;flex-direction:column;gap:2px}
        .filter-label{font-size:0.75rem;color:#666}
        .filter-select,.filter-date{padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.8rem;background:#fff;min-width:100px}
        .navbar{background:linear-gradient(90deg,#1a3a6c,#2c5aa0);color:#fff;border-radius:8px;padding:8px 12px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .navbar-brand{display:flex;align-items:center;gap:6px;font-size:1.1rem;font-weight:600}
        .nav-buttons{display:flex;gap:6px;flex-wrap:wrap}
        .nav-btn{background:rgba(255,255,255,0.18);color:#fff;border:none;padding:5px 10px;font-size:0.8rem;border-radius:4px;cursor:pointer}
        .nav-btn:hover{background:rgba(255,255,255,0.28)}
        .recycle-bin-btn{position:relative}
        .recycle-badge{position:absolute;top:-5px;right:-5px;background:#e74c3c;color:#fff;border-radius:50%;width:18px;height:18px;font-size:0.7rem;display:flex;align-items:center;justify-content:center}
        header{text-align:center;padding:15px 0;margin-bottom:20px}
        header h1{color:#fff;font-size:1.8rem;margin-bottom:8px;text-shadow:0 1px 3px rgba(0,0,0,0.3)}
        header p{color:#ecf0f1;font-size:0.95rem}
        .input-section{background:#fff;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.15);padding:20px;margin-bottom:20px}
        .section-title{font-size:1.2rem;color:#2c3e50;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #3498db}
        .input-group{margin-bottom:15px}
        label{display:block;margin-bottom:6px;font-weight:600;color:#2c3e50;font-size:0.9rem}
        .input-with-categories{display:flex;gap:15px}
        #orderData{width:65%;height:120px;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;resize:vertical}
        .category-button-group{display:flex;flex-direction:column;gap:8px;width:35%}
        .category-btn{padding:8px 12px;border:2px solid #ddd;border-radius:6px;background:#fff;color:#555;font-size:0.85rem;cursor:pointer}
        .category-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:#667eea}
        .btn-group{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px}
        .btn{padding:10px 16px;border:none;border-radius:6px;font-size:0.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
        .btn-primary{background:linear-gradient(to right,#3498db,#2980b9);color:#fff}
        .btn-secondary{background:linear-gradient(to right,#2ecc71,#27ae60);color:#fff}
        .btn-warning{background:linear-gradient(to right,#e74c3c,#c0392b);color:#fff}
        .btn-danger{background:linear-gradient(to right,#e74c3c,#c0392b);color:#fff}
        .message{padding:10px;border-radius:6px;margin:12px 0;text-align:center;font-weight:500;display:none}
        .success{background:rgba(46,204,113,0.15);color:#27ae60;border:1px solid #2ecc71}
        .error{background:rgba(231,76,60,0.15);color:#c0392b;border:1px solid #e74c3c}
        .history-section{background:#fff;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.15);padding:18px;margin-top:20px}
        .history-controls{display:flex;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:10px;align-items:center}
        .history-container{display:grid;gap:15px}
        .history-card{background:#f8f9fa;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;position:relative}
        .history-header{background:linear-gradient(90deg,#1a3a6c,#2c5aa0);color:#fff;padding:10px 12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;font-size:0.9rem}
        .history-time{font-size:0.75rem;opacity:0.85}
        .delete-btn{background:rgba(231,76,60,0.3);color:#fff;border:none;width:24px;height:24px;border-radius:50%;cursor:pointer}
        .history-body{padding:12px}
        .compensation-card{background:#fff;border-radius:6px;padding:10px;margin-top:8px;border:1px solid #e1e8f0}
        .compensation-header{background:#f1f6fd;padding:6px 8px;font-weight:600;font-size:0.85rem;border-radius:4px 4px 0 0}
        .compensation-content{padding:8px;font-family:monospace;white-space:pre-wrap;word-break:break-word;font-size:0.8rem;font-weight:700}
        .compensation-amount{color:#e74c3c;font-weight:bold}
        .profit-positive{color:#27ae60;font-weight:bold}
        .profit-negative{color:#e74c3c;font-weight:bold}
        .profit-tag{font-weight:bold;margin-left:15px;padding:2px 6px;border-radius:4px}
        .pay-me{background:rgba(46,204,113,0.2);color:#27ae60}
        .pay-you{background:rgba(231,76,60,0.2);color:#c0392b}
        .user-card{background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:12px;border:1px solid #e1e8f0;width:calc(33.333% - 10px)}
        .user-card-header{display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
        .user-name{font-weight:600;color:#2c3e50}
        .user-date{font-size:0.75rem;color:#7f8c8d}
        .user-info-row{display:flex;justify-content:space-between;margin:4px 0;font-size:0.85rem}
        .info-label{font-weight:500;color:#555}
        .info-value{font-weight:600;color:#2980b9}
        .winning-section{margin-top:8px}
        .winning-title{font-weight:600;color:#2c3e50;margin-bottom:4px;font-size:0.85rem;display:flex;align-items:center;gap:4px}
        .winning-item{display:flex;justify-content:space-between;padding:2px 0;font-size:0.8rem}
        .winning-type{color:#555}
        .winning-amount{color:#27ae60;font-weight:600}
        .profit-loss{font-weight:600;padding:2px 5px;border-radius:3px;font-size:0.8rem;margin-top:6px;text-align:right}
        .dynamic-table-container{margin-top:10px;width:100%;overflow:auto}
        .dynamic-table{width:100%;border-collapse:collapse;font-size:0.85rem;border:1px solid #e1e8f0}
        .dynamic-table th,.dynamic-table td{border:1px solid #e1e8f0;padding:8px 4px;text-align:center}
        .dynamic-table th{background:#f1f6fd;font-weight:600}
        .serial-number{color:#2980b9;font-weight:600}
        .order-amount{font-weight:600;color:#2c3e50}
        .small-font{font-size:0.75em}
        .empty-history{text-align:center;padding:20px;color:#7f8c8d}
        .counter{background:#e74c3c;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;margin-left:5px}
        .category-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:0.75rem}
        .category-macau-up{background:rgba(52,152,219,0.2);color:#2980b9}
        .category-macau-down{background:rgba(46,204,113,0.2);color:#27ae60}
        .category-guangdong-up{background:rgba(155,89,182,0.2);color:#8e44ad}
        .category-guangdong-down{background:rgba(241,196,15,0.2);color:#f39c12}
        .file-input{display:none}
        .confirm-dialog{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:1000}
        .confirm-dialog.show{display:flex}
        .confirm-content{background:#fff;padding:20px;border-radius:8px;max-width:500px;width:90%;text-align:center}
        .confirm-buttons{display:flex;gap:10px;justify-content:center;margin-top:15px}
        .confirm-btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer}
        .confirm-yes{background:#2ecc71;color:#fff}
        .confirm-no{background:#e74c3c;color:#fff}
        .confirm-cancel{background:#95a5a6;color:#fff}
        .import-preview-dialog{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:2000}
        .import-preview-content{background:#fff;padding:25px;border-radius:10px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto}
        .import-stats{display:flex;justify-content:space-around;margin-bottom:20px;padding:15px;background:#f8f9fa;border-radius:8px}
        .stat-value{font-size:1.5rem;font-weight:bold;color:#3498db}
        .import-list{margin-top:15px;max-height:300px;overflow-y:auto;border:1px solid #eee;border-radius:6px;padding:10px}
        .import-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}
        .import-item-status{padding:3px 8px;border-radius:4px;font-size:0.8rem}
        .status-new{background:rgba(46,204,113,0.2);color:#27ae60}
        .status-duplicate{background:rgba(231,76,60,0.2);color:#c0392b}
        .import-preview-buttons{display:flex;gap:10px;justify-content:center;margin-top:20px}
        .summary-container{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .summary-card{background:#f8f9fa;border-radius:8px;padding:12px;border:1px solid #e1e8f0}
        .summary-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
        .summary-table{width:100%;border-collapse:collapse;font-size:0.85rem}
        .summary-table th,.summary-table td{padding:6px 8px;border-bottom:1px solid #eee}
        .summary-value{font-weight:600;color:#2980b9}
        .winning-summary{margin-top:8px}
        .winning-summary-title{font-weight:600;color:#2c3e50;margin-bottom:4px;font-size:0.85rem;display:flex;align-items:center;gap:4px}
        .winning-summary-item{display:flex;justify-content:space-between;padding:2px 0;font-size:0.8rem}
        .password-dialog{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:2000}
        .password-content{background:#fff;padding:25px;border-radius:10px;text-align:center;width:350px}
        .password-input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px;font-size:1rem}
        .password-btn{background:linear-gradient(to right,#3498db,#2980b9);color:#fff;border:none;padding:12px 20px;border-radius:5px;cursor:pointer;font-size:1rem;font-weight:600;width:100%;margin-top:10px}
        .format-selector{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:3000}
        .format-content{background:#fff;padding:25px;border-radius:10px;text-align:center;width:350px}
        .format-option{padding:12px;border:2px solid #ddd;border-radius:6px;background:#fff;cursor:pointer}
        .format-option.selected{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:#667eea}
        .recycle-panel{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:#fff;box-shadow:-2px 0 10px rgba(0,0,0,0.1);z-index:1500;transition:right 0.3s;padding:20px;overflow-y:auto}
        .recycle-panel.open{right:0}
        .batch-operations{background:#fff;border-radius:6px;padding:10px 15px;margin-bottom:15px;display:none;align-items:center;gap:10px}
        .batch-operations.show{display:flex}
        .history-card-select{position:absolute;top:8px;left:8px}
        .highlight-applicant{color:#ffeb3b!important;font-weight:bold}
        .highlight-category{color:#00ff7f!important;font-weight:bold}
        #myAccountContainer{display:flex;flex-direction:column;gap:12px}
        @media(max-width:1400px){.container{flex-direction:column}.user-sidebar{width:100%}}
        @media(max-width:768px){.history-container{grid-template-columns:1fr}.input-with-categories{flex-direction:column}#orderData,.category-button-group{width:100%}.user-card{width:100%}.recycle-panel{width:100%;right:-100%}}
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> 系统访问受限</h2>
            <p>请输入访问密码</p>
            <input type="password" id="accessPassword" class="login-input" placeholder="输入访问密码">
            <div class="login-error" id="loginError">密码错误</div>
            <button class="login-btn" onclick="checkAccessPassword()">进入系统</button>
        </div>
    </div>

    <div class="password-dialog" id="passwordDialog">
        <div class="password-content">
            <h3>操作需要密码验证</h3>
            <p id="passwordPromptText">请输入操作密码</p>
            <input type="password" id="operationPassword" class="password-input" placeholder="输入密码">
            <div class="password-error" id="passwordError">密码错误</div>
            <button class="password-btn" onclick="verifyOperationPassword()">确认</button>
            <button class="password-btn password-cancel" onclick="closePasswordDialog()">取消</button>
        </div>
    </div>

    <div class="format-selector" id="formatSelector">
        <div class="format-content">
            <h3>选择导出格式</h3>
            <div class="format-options">
                <div class="format-option" data-format="txt" onclick="selectFormat(this,'txt')">TXT 格式</div>
                <div class="format-option" data-format="csv" onclick="selectFormat(this,'csv')">CSV 格式</div>
                <div class="format-option selected" data-format="json" onclick="selectFormat(this,'json')">JSON 格式</div>
            </div>
            <button class="btn btn-primary" onclick="confirmExport()">确认导出</button>
            <button class="btn btn-secondary" onclick="closeFormatSelector()">取消</button>
        </div>
    </div>

    <div class="import-preview-dialog" id="importPreviewDialog">
        <div class="import-preview-content">
            <div class="import-preview-header"><h3>导入订单预览</h3><button class="close-preview-btn" onclick="closeImportPreview()">&times;</button></div>
            <div class="import-stats">
                <div class="stat-item"><div class="stat-value" id="totalImportCount">0</div><div class="stat-label">总记录数</div></div>
                <div class="stat-item"><div class="stat-value" id="newImportCount">0</div><div class="stat-label">新记录</div></div>
                <div class="stat-item"><div class="stat-value" id="duplicateImportCount">0</div><div class="stat-label">重复记录</div></div>
            </div>
            <div class="import-list" id="importList"></div>
            <div class="import-preview-buttons">
                <button class="btn btn-primary" onclick="confirmImport()"><i class="fas fa-check"></i> 确认导入</button>
                <button class="btn btn-secondary" onclick="closeImportPreview()"><i class="fas fa-times"></i> 取消</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer" style="display:none;">
        <div class="main-content">
            <div class="navbar">
                <div class="navbar-brand"><i class="fas fa-file-invoice-dollar"></i><span>订单报表系统（云同步）</span></div>
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i> 刷新</button>
                    <button class="nav-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-file-import"></i> 导入</button>
                    <button class="nav-btn" onclick="showFormatSelector()"><i class="fas fa-file-export"></i> 导出</button>
                    <button class="nav-btn" onclick="importAllData()"><i class="fas fa-database"></i> 导入所有数据</button>
                    <button class="nav-btn" onclick="exportAllData()"><i class="fas fa-database"></i> 导出所有</button>
                    <button class="nav-btn recycle-bin-btn" onclick="toggleRecyclePanel()"><i class="fas fa-trash-restore"></i> 回收站<span class="recycle-badge" id="recycleBadge">0</span></button>
                    <button class="nav-btn" onclick="requestClearPassword()"><i class="fas fa-trash-alt"></i> 清空</button>
                </div>
            </div>
            <header><h1><i class="fas fa-chart-line"></i> 订单报表系统</h1><p>录入订单数据，自动识别中奖类型 · 云端实时同步</p></header>
            <div class="input-section">
                <h2 class="section-title"><i class="fas fa-edit"></i> 数据录入</h2>
                <div><label>报表日期：</label><input type="date" id="reportDate"></div>
                <div class="input-group"><label>订单数据录入</label>
                    <div class="input-with-categories">
                        <textarea id="orderData"></textarea>
                        <div class="category-button-group">
                            <button class="category-btn" data-category="澳门上家" onclick="selectCategory(this)">澳门上家</button>
                            <button class="category-btn active" data-category="澳门下家" onclick="selectCategory(this)">澳门下家</button>
                            <button class="category-btn" data-category="粤港上家" onclick="selectCategory(this)">粤港上家</button>
                            <button class="category-btn" data-category="粤港下家" onclick="selectCategory(this)">粤港下家</button>
                        </div>
                    </div>
                </div>
                <div class="message success" id="successMsg">保存成功！</div>
                <div class="message error" id="errorMsg"></div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()"><i class="fas fa-save"></i> 保存报表</button>
                    <button class="btn btn-secondary" onclick="clearInput()">清空输入</button>
                </div>
            </div>
            <div class="history-section">
                <div class="history-controls">
                    <h2 class="section-title"><i class="fas fa-history"></i> 历史记录 <span class="counter" id="recordCounter">0</span></h2>
                    <div><label>日期：</label><input type="date" id="historyDateFilter" onchange="updateHistoryDisplay()"></div>
                    <div><label>用户：</label><select id="historyUserFilter" onchange="updateHistoryDisplay()"><option value="">全部</option></select></div>
                </div>
                <div class="batch-operations" id="historyBatchOperations">
                    <span>已选 <span id="selectedCount">0</span> 项</span>
                    <input type="checkbox" id="selectAllHistory" onchange="toggleSelectAll('history')"><label>全选</label>
                    <button class="btn btn-danger" onclick="batchDelete()">批量删除</button>
                    <button class="btn btn-warning" onclick="batchMoveToRecycle()">批量移至回收站</button>
                </div>
                <div class="history-container" id="historyContainer"><div class="empty-history">暂无记录</div></div>
            </div>
        </div>
        <div class="user-sidebar">
            <div class="search-filter-section">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索...">
                    <button class="search-btn" onclick="applyFilters()"><i class="fas fa-search"></i></button>
                </div>
                <div class="filter-group">
                    <div class="filter-item"><label class="filter-label">日期</label><input type="date" id="dateFilter" onchange="applyFilters()"></div>
                    <div class="filter-item"><label class="filter-label">分类</label><select id="categoryFilter" onchange="applyFilters()"><option value="">全部</option><option>澳门上家</option><option>澳门下家</option><option>粤港上家</option><option>粤港下家</option></select></div>
                    <div class="filter-item"><label class="filter-label">用户</label><select id="userFilter" onchange="applyFilters()"><option value="">全部</option></select></div>
                </div>
            </div>
            <div class="big-user-card"><div class="big-card-header"><i class="fas fa-user-circle"></i> 用户信息和中奖情况</div><div class="big-card-content" id="userCardsContainer"><div class="empty-history">暂无数据</div></div></div>
            <div class="big-user-card"><div class="big-card-header"><i class="fas fa-chart-bar"></i> 全部汇总</div><div class="big-card-content" id="summaryContainer"><div class="empty-history">暂无数据</div></div></div>
            <div class="big-user-card"><div class="big-card-header"><i class="fas fa-calculator"></i> 我的账户</div><div class="big-card-content"><div id="myAccountContainer"><div class="empty-history">暂无数据</div></div></div></div>
        </div>
    </div>

    <div class="recycle-panel" id="recyclePanel">
        <h3>回收站</h3>
        <div class="batch-operations" id="recycleBatchOperations">
            <span>已选 <span id="recycleSelectedCount">0</span> 项</span>
            <input type="checkbox" id="selectAllRecycle" onchange="toggleSelectAll('recycle')"><label>全选</label>
            <button class="btn btn-secondary" onclick="batchRestore()">批量恢复</button>
            <button class="btn btn-danger" onclick="batchDeletePermanent()">批量永久删除</button>
        </div>
        <div id="recycleItemsContainer"></div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept=".txt,.csv,.json" onchange="importData(event)">
    <div class="confirm-dialog" id="confirmDialog">
        <div class="confirm-content">
            <h3 id="confirmTitle"></h3><p id="confirmMessage"></p>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-yes" id="confirmYesBtn">确定</button>
                <button class="confirm-btn confirm-no" onclick="hideClearConfirm()">取消</button>
            </div>
        </div>
    </div>
    <div class="confirm-dialog" id="duplicateDialog">
        <div class="confirm-content">
            <h3>发现重复录入</h3><p id="duplicateMessage"></p>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-yes" onclick="forceSaveRecord()">强制保存</button>
                <button class="confirm-btn confirm-cancel" onclick="hideDuplicateDialog()">修改后再存</button>
                <button class="confirm-btn confirm-no" onclick="hideDuplicateDialog()">取消保存</button>
            </div>
        </div>
    </div>

    <script>
        // 动态加载 Supabase SDK
        (function() {
            const cdns = ['https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js', 'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'];
            let i = 0;
            function load() { if (i >= cdns.length) { alert('SDK加载失败'); return; } const s = document.createElement('script'); s.src = cdns[i]; s.onload = initApp; s.onerror = () => { i++; load(); }; document.head.appendChild(s); }
            load();
        })();

        function initApp() {
            const supabase = window.supabase.createClient('https://xgoglgmkufrompjtggtj.supabase.co', 'sb_publishable_aq2-wq7VsxfyQBvwQQBBkQ_zoehaCDp');
            const ACCESS_PASSWORD = '160601';
            const OPERATION_PASSWORD = '891105';
            let history = [], recycle = [];
            let selectedCategory = '澳门下家', exportFormat = 'json', currentOperation = null;
            let pendingRecord = null, pendingImportRecords = [];
            let selectedHistoryIds = new Set(), selectedRecycleIds = new Set();
            let filter = { search: '', date: '', category: '', user: '' };

            function toast(msg, type) {
                const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
                document.getElementById('toastContainer').appendChild(t);
                setTimeout(() => t.classList.add('show'), 10);
                setTimeout(() => { t.classList.remove('show'); t.remove(); }, 3000);
            }

            async function saveDB(store, data) { const t = store === 'records' ? 'records' : 'recycle_bin'; const { error } = await supabase.from(t).upsert(data); if (error) throw error; }
            async function getAllDB(store) { const t = store === 'records' ? 'records' : 'recycle_bin'; const { data, error } = await supabase.from(t).select('*').order('created_at', { ascending: false }); if (error) throw error; return data || []; }
            async function deleteDB(store, id) { const t = store === 'records' ? 'records' : 'recycle_bin'; await supabase.from(t).delete().eq('id', id); }
            async function clearDB(store) { const t = store === 'records' ? 'records' : 'recycle_bin'; await supabase.from(t).delete().neq('id', 0); }
            async function loadData() { history = await getAllDB('records'); recycle = await getAllDB('recycle_bin'); }

            function getFiltered() {
                let r = history;
                const s = filter.search.toLowerCase();
                if (s) r = r.filter(x => x.applicant.toLowerCase().includes(s) || x.timestamp.includes(s) || x.category.toLowerCase().includes(s));
                if (filter.date) r = r.filter(x => x.timestamp === filter.date);
                if (filter.category) r = r.filter(x => x.category === filter.category);
                if (filter.user) r = r.filter(x => x.applicant === filter.user);
                return r;
            }

            window.applyFilters = () => {
                filter.search = document.getElementById('searchInput').value.trim();
                filter.date = document.getElementById('dateFilter').value;
                filter.category = document.getElementById('categoryFilter').value;
                filter.user = document.getElementById('userFilter').value;
                updateUserCards(); updateSummary(); updateMyAccount();
                const uf = document.getElementById('userFilter');
                const users = [...new Set(history.map(x => x.applicant))];
                uf.innerHTML = '<option value="">全部</option>' + users.map(u => `<option>${u}</option>`).join('');
                if (filter.user) uf.value = filter.user;
            };

            window.checkAccessPassword = async () => {
                if (document.getElementById('accessPassword').value === ACCESS_PASSWORD) {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainContainer').style.display = 'flex';
                    await loadData();
                    initSystem();
                } else { document.getElementById('loginError').style.display = 'block'; }
            };

            function initSystem() {
                document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('historyDateFilter').value = '';
                document.getElementById('historyDateFilter').addEventListener('change', updateHistoryDisplay);
                document.getElementById('historyUserFilter').addEventListener('change', updateHistoryDisplay);
                document.getElementById('orderData').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveRecord(); } });
                document.getElementById('accessPassword').addEventListener('keypress', e => { if (e.key === 'Enter') checkAccessPassword(); });
                document.getElementById('operationPassword').addEventListener('keypress', e => { if (e.key === 'Enter') verifyOperationPassword(); });
                updateAll();
                supabase.channel('realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'records' }, () => { loadData().then(updateAll); }).subscribe();
            }

            window.selectCategory = function(btn) { document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedCategory = btn.dataset.category; };

            function extractOrderData(input, applicant) {
                let totalAmount = '0', profitLoss = '0';
                const tm = input.match(/订单总额：([\d.]+)/); if (tm) totalAmount = tm[1];
                const pm = input.match(/盈亏情况：([\d.-]+)/); if (pm) profitLoss = pm[1];
                const winnings = {};
                input.split('\n').forEach(line => {
                    if (line.includes(' 中:')) {
                        const m = line.match(/^([^\n:]+?) 中:/);
                        if (m) {
                            const type = m[1].trim(); let as = line.substring(m[0].length).trim();
                            if (as.includes('=')) as = as.split('=').pop();
                            const am = as.match(/[\d.]+/);
                            if (am) winnings[type] = winnings[type] ? (parseFloat(winnings[type]) + parseFloat(am[0])).toString() : am[0];
                        }
                    }
                });
                return { applicant, totalAmount, winnings, profitLoss };
            }
            function extractAmountDetail(input) { const s = input.indexOf('订单金额明细：'); if (s === -1) return ''; const e = input.indexOf('=', s); return e === -1 ? '' : input.substring(s + 7, e).trim(); }

            window.saveRecord = async () => {
                const btn = document.getElementById('saveBtn'); btn.classList.add('loading');
                const input = document.getElementById('orderData').value;
                const date = document.getElementById('reportDate').value || new Date().toISOString().split('T')[0];
                if (!input.trim()) { toast('请输入数据', 'error'); btn.classList.remove('loading'); return; }
                let applicant = '未知'; const am = input.match(/申报人：([^\n]+)/); if (am) applicant = am[1].trim();
                const ds = input.indexOf('订单金额明细：'), de = input.indexOf('=', ds);
                if (ds === -1 || de === -1) { toast('格式错误', 'error'); btn.classList.remove('loading'); return; }
                const detail = input.substring(ds + 7, de).trim().replace(/[^0-9+]/g, '');
                const orderData = detail.split('+').map(s => { const n = parseFloat(s); if (isNaN(n)) throw new Error('数字错误'); return n; });
                const ed = extractOrderData(input, applicant);
                if (history.some(r => r.timestamp === date && r.applicant === applicant && extractAmountDetail(r.originalData) === extractAmountDetail(input))) {
                    pendingRecord = { date, applicant, orderDataInput: input };
                    document.getElementById('duplicateMessage').innerHTML = '检测到相同日期、相同申报人的相似订单记录。<br>是否继续保存？';
                    document.getElementById('duplicateDialog').classList.add('show');
                    btn.classList.remove('loading'); return;
                }
                await directSave(date, applicant, input, orderData, ed);
            };
            window.forceSaveRecord = async () => {
                if (!pendingRecord) return;
                const { date, applicant, orderDataInput } = pendingRecord;
                const ds = orderDataInput.indexOf('订单金额明细：'), de = orderDataInput.indexOf('=', ds);
                const detail = orderDataInput.substring(ds + 7, de).trim().replace(/[^0-9+]/g, '');
                const orderData = detail.split('+').map(s => parseFloat(s));
                const ed = extractOrderData(orderDataInput, applicant);
                await directSave(date, applicant, orderDataInput, orderData, ed);
                hideDuplicateDialog();
            };
            window.hideDuplicateDialog = () => document.getElementById('duplicateDialog').classList.remove('show');

            async function directSave(date, applicant, input, orderData, ed) {
                const record = { id: Date.now(), timestamp: date, category: selectedCategory, applicant, originalData: input, tableHTML: createTable(orderData), compensationCardHTML: createCard(input, selectedCategory), dataCount: orderData.length, extractedData: ed, created_at: new Date().toISOString() };
                history.unshift(record);
                await saveDB('records', record);
                updateAll();
                document.getElementById('orderData').value = '';
                document.getElementById('successMsg').style.display = 'block';
                toast('保存成功', 'success');
                setTimeout(() => { document.getElementById('successMsg').style.display = 'none'; document.getElementById('saveBtn').classList.remove('loading'); }, 3000);
            }

            function createTable(data) {
                const count = data.length; let cols = 4;
                if (count <= 5) cols = 1; else if (count <= 12) cols = 2; else if (count <= 24) cols = 3; else if (count <= 40) cols = 4; else if (count <= 60) cols = 5; else cols = 6;
                const rows = Math.ceil(count / cols);
                let h = '<div class="dynamic-table-container"><table class="dynamic-table"><thead><tr>';
                for (let i = 0; i < cols; i++) h += '<th>序</th><th>下单</th>';
                h += '</tr></thead><tbody>';
                for (let r = 0; r < rows; r++) {
                    h += '<tr>';
                    for (let c = 0; c < cols; c++) {
                        const idx = r + c * rows;
                        if (idx < count) {
                            const amt = data[idx], str = amt.toString(), cls = str.length > 6 ? ' class="small-font"' : '';
                            h += `<td><span class="serial-number">${idx+1}</span></td><td${cls}><span class="order-amount">${amt}</span></td>`;
                        } else h += '<td></td><td></td>';
                    }
                    h += '</tr>';
                }
                h += '</tbody></table></div>'; return h;
            }

            function createCard(input, category) {
                if (!input) return '';
                const filtered = input.replace(/订单金额明细：.*?\(共计\d+条\)/s, '').trim().split('\n');
                let p = [];
                filtered.forEach(line => {
                    if (line.includes('盈亏情况：')) {
                        const m = line.match(/盈亏情况：([\d.-]+)/);
                        if (m) {
                            let amt = m[1], num = parseFloat(amt); if (!isNaN(num)) amt = Math.trunc(num).toString();
                            const cls = num >= 0 ? 'profit-positive' : 'profit-negative', sign = num >= 0 ? '+' : '';
                            let tag = '';
                            if (category.includes('下家')) tag = num > 0 ? '<span class="profit-tag pay-me">付我</span>' : num < 0 ? '<span class="profit-tag pay-you">付你</span>' : '';
                            else tag = num > 0 ? '<span class="profit-tag pay-you">付你</span>' : num < 0 ? '<span class="profit-tag pay-me">付我</span>' : '';
                            p.push(line.replace(/(盈亏情况：)([\d.-]+)/, `$1<span class="${cls}">${sign}${amt}</span>${tag}`));
                        } else p.push(line);
                    } else {
                        let nl = line.replace(/(赔:)([\d.]+)/g, (m, p1, p2) => p1 + '<span class="compensation-amount">' + Math.trunc(parseFloat(p2)) + '</span>');
                        p.push(nl);
                    }
                });
                return '<div class="compensation-card"><div class="compensation-header">赔付明细</div><div class="compensation-content">' + p.join('\n') + '</div></div>';
            }

            function updateAll() { updateHistoryDisplay(); updateUserCards(); updateSummary(); updateMyAccount(); document.getElementById('recycleBadge').textContent = recycle.length; renderRecycle(); updateBatchOpsVisibility(); fillUserFilter(); }

            function fillUserFilter() {
                const uf = document.getElementById('historyUserFilter'), users = [...new Set(history.map(x => x.applicant))];
                uf.innerHTML = '<option value="">全部</option>' + users.map(u => `<option>${u}</option>`).join('');
            }

            window.updateHistoryDisplay = function() {
                const fd = document.getElementById('historyDateFilter').value, fu = document.getElementById('historyUserFilter').value;
                let r = history; if (fd) r = r.filter(x => x.timestamp === fd); if (fu) r = r.filter(x => x.applicant === fu);
                document.getElementById('recordCounter').textContent = r.length;
                const c = document.getElementById('historyContainer');
                if (!r.length) { c.innerHTML = '<div class="empty-history">暂无记录</div>'; return; }
                c.innerHTML = r.map((x, i) => {
                    const sel = selectedHistoryIds.has(x.id);
                    return `<div class="history-card" data-id="${x.id}">
                        <div class="history-card-select"><input type="checkbox" class="history-checkbox" ${sel?'checked':''} onchange="toggleHistorySelection(${x.id}, this.checked)"></div>
                        <div class="history-header"><div><span class="highlight-applicant">${x.applicant}</span> #${i+1} <span class="category-tag ${getCatClass(x.category)} highlight-category">${x.category}</span></div>
                        <div><span class="history-time">${x.timestamp}</span><button class="delete-btn" onclick="showDeleteConfirm(${x.id})">🗑</button></div></div>
                        <div class="history-body">${x.tableHTML||''}${x.compensationCardHTML||''}</div></div>`;
                }).join('');
                fillUserFilter();
            };

            function updateUserCards() {
                const r = getFiltered(), c = document.getElementById('userCardsContainer');
                if (!r.length) { c.innerHTML = '<div class="empty-history">暂无数据</div>'; return; }
                const users = {}; r.forEach(x => { if (!users[x.applicant]) users[x.applicant] = []; users[x.applicant].push(x); });
                c.innerHTML = Object.entries(users).map(([name, recs]) => {
                    let totalAmount = 0, totalProfit = 0, wins = {};
                    recs.forEach(x => { const d = x.extractedData; totalAmount += Math.trunc(parseFloat(d.totalAmount || 0)); totalProfit += Math.trunc(parseFloat(d.profitLoss || 0)); Object.entries(d.winnings || {}).forEach(([k, v]) => { wins[k] = (wins[k] || 0) + Math.trunc(parseFloat(v || 0)); }); });
                    const cls = totalProfit >= 0 ? 'profit-positive' : 'profit-negative';
                    let h = `<div class="user-card"><div class="user-card-header"><div class="user-name">${name}</div></div><div>总额:${totalAmount}</div><div class="winning-section"><div class="winning-title"><i class="fas fa-trophy"></i>中奖</div>`;
                    if (Object.keys(wins).length) Object.entries(wins).forEach(([k, v]) => h += `<div class="winning-item">${k}:${v}</div>`);
                    else h += '<div>无</div>';
                    h += `</div><div class="profit-loss ${cls}">盈亏:${totalProfit}</div></div>`;
                    return h;
                }).join('');
            }

            function updateSummary() {
                const r = getFiltered(), c = document.getElementById('summaryContainer');
                if (!r.length) { c.innerHTML = '<div class="empty-history">暂无数据</div>'; return; }
                const cats = ['澳门上家', '澳门下家', '粤港上家', '粤港下家'];
                c.innerHTML = '<div class="summary-container">' + cats.map(cat => {
                    const recs = r.filter(x => x.category === cat);
                    const total = recs.reduce((s, x) => s + Math.trunc(parseFloat(x.extractedData?.totalAmount || 0)), 0);
                    const profit = recs.reduce((s, x) => s + Math.trunc(parseFloat(x.extractedData?.profitLoss || 0)), 0);
                    const wins = {}; recs.forEach(x => Object.entries(x.extractedData?.winnings || {}).forEach(([k, v]) => { wins[k] = (wins[k] || 0) + Math.trunc(parseFloat(v || 0)); }));
                    return `<div class="summary-card"><div class="summary-header"><div class="summary-title">${cat}</div></div><div>总额:${total}</div><div class="${profit>=0?'profit-positive':'profit-negative'}">盈亏:${profit>=0?'+':''}${profit}</div><div class="winning-summary"><div class="winning-summary-title">中奖统计</div>${Object.keys(wins).length?Object.entries(wins).map(([k,v])=>`<div class="winning-summary-item">${k}:${v>=0?'+':''}${v}</div>`).join(''):'无'}</div></div>`;
                }).join('') + '</div>';
            }

            function updateMyAccount() {
                const r = getFiltered(), c = document.getElementById('myAccountContainer');
                if (!r.length) { c.innerHTML = '<div class="empty-history">暂无数据</div>'; return; }
                const calc = cat => { const recs = r.filter(x => x.category === cat); const profit = recs.reduce((s, x) => s + Math.trunc(parseFloat(x.extractedData?.profitLoss || 0)), 0); const w = {}; recs.forEach(x => Object.entries(x.extractedData?.winnings || {}).forEach(([k, v]) => { w[k] = (w[k] || 0) + Math.trunc(parseFloat(v || 0)); })); return { profit, w }; };
                const md = calc('澳门下家'), mu = calc('澳门上家'), gd = calc('粤港下家'), gu = calc('粤港上家');
                const mp = md.profit - mu.profit, gp = gd.profit - gu.profit;
                const mw = {}, gw = {};
                Object.entries(md.w).forEach(([k, v]) => mw[k] = (mw[k] || 0) + v); Object.entries(mu.w).forEach(([k, v]) => mw[k] = (mw[k] || 0) - v);
                Object.entries(gd.w).forEach(([k, v]) => gw[k] = (gw[k] || 0) + v); Object.entries(gu.w).forEach(([k, v]) => gw[k] = (gw[k] || 0) - v);
                c.innerHTML = `<div class="summary-card" style="margin-bottom:12px"><div class="summary-title">我的澳门</div><div class="${mp>=0?'profit-positive':'profit-negative'}">${mp>=0?'+':''}${mp}</div><div class="winning-summary">${Object.keys(mw).length?Object.entries(mw).map(([k,v])=>`${k}:${v>=0?'+':''}${v}`).join(' '):'无'}</div></div><div class="summary-card"><div class="summary-title">我的粤港</div><div class="${gp>=0?'profit-positive':'profit-negative'}">${gp>=0?'+':''}${gp}</div><div class="winning-summary">${Object.keys(gw).length?Object.entries(gw).map(([k,v])=>`${k}:${v>=0?'+':''}${v}`).join(' '):'无'}</div></div>`;
            }

            function getCatClass(cat) { switch (cat) { case '澳门上家': return 'category-macau-up'; case '澳门下家': return 'category-macau-down'; case '粤港上家': return 'category-guangdong-up'; case '粤港下家': return 'category-guangdong-down'; } return ''; }

            // 删除/恢复/回收站/批量操作（保持一致）
            window.showDeleteConfirm = id => {
                document.getElementById('confirmTitle').textContent = '确认删除';
                document.getElementById('confirmMessage').textContent = '移至回收站？';
                document.getElementById('confirmYesBtn').onclick = async () => {
                    const idx = history.findIndex(x => x.id === id); if (idx === -1) return;
                    const rec = history.splice(idx, 1)[0]; rec.deletedAt = new Date().toISOString();
                    await saveDB('recycle_bin', rec); await deleteDB('records', id);
                    recycle.unshift(rec); selectedHistoryIds.delete(id);
                    updateAll(); document.getElementById('confirmDialog').classList.remove('show');
                    toast('已移至回收站', 'warning');
                };
                document.getElementById('confirmDialog').classList.add('show');
            };
            window.hideClearConfirm = () => document.getElementById('confirmDialog').classList.remove('show');
            window.restore = async id => {
                const idx = recycle.findIndex(x => x.id === id); if (idx === -1) return;
                const rec = recycle.splice(idx, 1)[0]; delete rec.deletedAt;
                await saveDB('records', rec); await deleteDB('recycle_bin', id);
                history.unshift(rec); selectedRecycleIds.delete(id);
                updateAll(); toast('已恢复', 'success');
            };
            window.deletePerm = async id => { await deleteDB('recycle_bin', id); recycle = recycle.filter(x => x.id !== id); selectedRecycleIds.delete(id); updateAll(); toast('已永久删除', 'error'); };
            window.toggleRecyclePanel = () => { document.getElementById('recyclePanel').classList.toggle('open'); renderRecycle(); };
            function renderRecycle() {
                const c = document.getElementById('recycleItemsContainer');
                if (!recycle.length) { c.innerHTML = '<div class="empty-history">回收站为空</div>'; return; }
                c.innerHTML = recycle.map(x => {
                    const sel = selectedRecycleIds.has(x.id);
                    return `<div class="recycle-item"><div><input type="checkbox" class="recycle-checkbox" ${sel?'checked':''} onchange="toggleRecycleSelection(${x.id}, this.checked)"><strong>${x.applicant}</strong> ${x.timestamp}</div><div><button class="restore-btn" onclick="restore(${x.id})">恢复</button><button class="delete-permanently-btn" onclick="deletePerm(${x.id})">删除</button></div></div>`;
                }).join('');
            }

            window.toggleHistorySelection = (id, checked) => { checked ? selectedHistoryIds.add(id) : selectedHistoryIds.delete(id); updateBatchOpsVisibility(); };
            window.toggleRecycleSelection = (id, checked) => { checked ? selectedRecycleIds.add(id) : selectedRecycleIds.delete(id); updateBatchOpsVisibility(); };
            window.toggleSelectAll = type => {
                if (type === 'history') {
                    const chk = document.getElementById('selectAllHistory').checked;
                    document.querySelectorAll('.history-checkbox').forEach(cb => { cb.checked = chk; toggleHistorySelection(parseInt(cb.closest('.history-card').dataset.id), chk); });
                } else {
                    const chk = document.getElementById('selectAllRecycle').checked;
                    document.querySelectorAll('.recycle-checkbox').forEach(cb => { cb.checked = chk; toggleRecycleSelection(parseInt(cb.closest('.recycle-item').dataset.id), chk); });
                }
            };
            function updateBatchOpsVisibility() {
                document.getElementById('historyBatchOperations').classList.toggle('show', selectedHistoryIds.size > 0);
                document.getElementById('selectedCount').textContent = selectedHistoryIds.size;
                document.getElementById('recycleBatchOperations').classList.toggle('show', selectedRecycleIds.size > 0);
                document.getElementById('recycleSelectedCount').textContent = selectedRecycleIds.size;
            }
            window.batchDelete = async () => {
                const ids = [...selectedHistoryIds];
                for (const id of ids) {
                    const idx = history.findIndex(x => x.id === id); if (idx === -1) continue;
                    const rec = history.splice(idx, 1)[0]; rec.deletedAt = new Date().toISOString();
                    await saveDB('recycle_bin', rec); await deleteDB('records', id);
                    recycle.unshift(rec);
                }
                selectedHistoryIds.clear(); updateAll(); toast('批量移至回收站', 'warning');
            };
            window.batchMoveToRecycle = window.batchDelete;
            window.batchRestore = async () => {
                const ids = [...selectedRecycleIds];
                for (const id of ids) {
                    const idx = recycle.findIndex(x => x.id === id); if (idx === -1) continue;
                    const rec = recycle.splice(idx, 1)[0]; delete rec.deletedAt;
                    await saveDB('records', rec); await deleteDB('recycle_bin', id);
                    history.unshift(rec);
                }
                selectedRecycleIds.clear(); updateAll(); toast('批量恢复', 'success');
            };
            window.batchDeletePermanent = async () => {
                const ids = [...selectedRecycleIds];
                for (const id of ids) await deleteDB('recycle_bin', id);
                recycle = recycle.filter(x => !ids.includes(x.id));
                selectedRecycleIds.clear(); updateAll(); toast('批量永久删除', 'error');
            };

            // 导出
            window.showFormatSelector = () => document.getElementById('formatSelector').style.display = 'flex';
            window.closeFormatSelector = () => document.getElementById('formatSelector').style.display = 'none';
            window.selectFormat = (el, fmt) => { document.querySelectorAll('.format-option').forEach(o => o.classList.remove('selected')); el.classList.add('selected'); exportFormat = fmt; };
            window.confirmExport = () => { closeFormatSelector(); exportAllData(); };
            window.exportAllData = () => {
                if (!history.length) return toast('无数据', 'error');
                let blob, name;
                if (exportFormat === 'json') { blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' }); name = '数据.json'; }
                else if (exportFormat === 'csv') { let csv = 'ID,日期,分类,申报人,总额,盈亏\n'; history.forEach(x => csv += `${x.id},${x.timestamp},${x.category},${x.applicant},${x.extractedData?.totalAmount||''},${x.extractedData?.profitLoss||''}\n`); blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); name = '数据.csv'; }
                else { let txt = ''; history.forEach((x, i) => txt += `=== 订单 #${i+1} ===\n${x.originalData}\n\n`); blob = new Blob([txt], { type: 'text/plain' }); name = '数据.txt'; }
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); toast('导出成功', 'success');
            };

            // 导入预览判断重复
            function checkDuplicateRecord(item) {
                return history.some(r => r.timestamp === item.timestamp && r.applicant === item.applicant && extractAmountDetail(r.originalData) === extractAmountDetail(item.originalData));
            }

            window.importData = function(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const content = ev.target.result;
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'json') {
                        try {
                            const data = JSON.parse(content);
                            if (!Array.isArray(data)) { toast('JSON 格式错误：需要数组', 'error'); return; }
                            const newRecs = [], dups = [];
                            data.forEach(item => {
                                if (item.originalData && item.timestamp && item.applicant) {
                                    checkDuplicateRecord(item) ? dups.push(item) : newRecs.push(item);
                                }
                            });
                            pendingImportRecords = newRecs;
                            showImportPreview(newRecs.length, dups.length, data);
                        } catch (e) { toast('JSON 解析失败: ' + e.message, 'error'); }
                    } else {
                        document.getElementById('orderData').value = content;
                        toast('数据已导入到输入框，请手动保存', 'info');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            function showImportPreview(newCnt, dupCnt, all) {
                document.getElementById('totalImportCount').textContent = newCnt + dupCnt;
                document.getElementById('newImportCount').textContent = newCnt;
                document.getElementById('duplicateImportCount').textContent = dupCnt;
                const list = document.getElementById('importList');
                list.innerHTML = '';
                all.slice(0, 10).forEach(r => {
                    const dup = checkDuplicateRecord(r);
                    const div = document.createElement('div');
                    div.className = 'import-item';
                    div.innerHTML = `<div><strong>${r.applicant}</strong> - ${r.timestamp} <span class="category-tag">${r.category||'未知'}</span></div><div class="import-item-status ${dup?'status-duplicate':'status-new'}">${dup?'重复':'新记录'}</div>`;
                    list.appendChild(div);
                });
                document.getElementById('importPreviewDialog').style.display = 'flex';
            }

            window.closeImportPreview = function() {
                document.getElementById('importPreviewDialog').style.display = 'none';
                pendingImportRecords = [];
            };

            window.confirmImport = async function() {
                if (!pendingImportRecords.length) { toast('没有新记录可导入', 'warning'); closeImportPreview(); return; }
                for (const item of pendingImportRecords) {
                    const rec = {
                        id: Date.now() + Math.random(),
                        timestamp: item.timestamp,
                        category: item.category || '未知分类',
                        applicant: item.applicant,
                        originalData: item.originalData,
                        tableHTML: item.tableHTML || '',
                        compensationCardHTML: item.compensationCardHTML || '',
                        dataCount: item.dataCount || 0,
                        extractedData: item.extractedData || {},
                        created_at: new Date().toISOString()
                    };
                    history.unshift(rec);
                    await saveDB('records', rec);
                }
                await loadData();
                updateAll();
                closeImportPreview();
                toast(`成功导入 ${pendingImportRecords.length} 条记录`, 'success');
            };

            window.importAllData = function() {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = '.json';
                inp.onchange = async function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (!Array.isArray(data)) { toast('JSON 格式错误：需要数组', 'error'); return; }
                            const newRecs = [], dups = [];
                            data.forEach(item => {
                                if (item.originalData && item.timestamp && item.applicant) {
                                    checkDuplicateRecord(item) ? dups.push(item) : newRecs.push(item);
                                }
                            });
                            pendingImportRecords = newRecs;
                            showImportPreview(newRecs.length, dups.length, data);
                        } catch (e) { toast('JSON 解析失败: ' + e.message, 'error'); }
                    };
                    reader.readAsText(file);
                };
                inp.click();
            };

            window.requestClearPassword = () => { currentOperation = 'clear'; document.getElementById('passwordPromptText').innerHTML = '请输入操作密码（891105）'; document.getElementById('passwordDialog').style.display = 'flex'; };
            window.verifyOperationPassword = () => { if (currentOperation === 'clear' && document.getElementById('operationPassword').value === OPERATION_PASSWORD) { closePasswordDialog(); if (confirm('确定清空所有数据？')) { clearDB('records'); clearDB('recycle_bin'); history = []; recycle = []; updateAll(); toast('已清空', 'success'); } } else { document.getElementById('passwordError').style.display = 'block'; } };
            window.closePasswordDialog = () => { document.getElementById('passwordDialog').style.display = 'none'; currentOperation = null; };
            window.clearInput = () => document.getElementById('orderData').value = '';
            window.refreshData = () => { loadData().then(updateAll); toast('刷新完成', 'success'); };
        }
    </script>
</body>
</html>
